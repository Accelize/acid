---

parameters:
  jobName: stopAgent
  agentDescription: Acid
  provider: awsEc2
  connection:
  region:
  dependsOn: startAgent

jobs:
  - job: ${{ parameters.jobName }}
    displayName: Stop ${{ parameters.agentDescription }} agent
    dependsOn: ${{ parameters.dependsOn }}
    condition: always()
    pool:
      vmImage: ubuntu-20.04
    variables:
      - name: acidDir
        value: $(Agent.BuildDirectory)/.acid
      - name: terraformWorkingDir
        value: $(acidDir)/agents/${{ parameters.provider }}

    steps:

      - checkout: acid
        displayName: Checkout Acid
        fetchDepth: 1
        path: .acid

      - task: DownloadPipelineArtifact@2
        displayName: Get state
        inputs:
          artifactName: Acid State ${{ parameters.agentDescription }}
          targetPath: $(terraformWorkingDir)

      - script: terraform init -input=false
        displayName: Initialize Terraform
        workingDirectory: $(terraformWorkingDir)

      - ${{ if eq(parameters.provider, 'awsEc2') }}:
        - task: AWSShellScript@1
          displayName: Stop agent
          inputs:
            awsCredentials: ${{ coalesce(parameters.connection, 'AWS') }}
            regionName: ${{ parameters.region }}
            scriptType: inline
            inlineScript: terraform destroy -auto-approve -input=false
            disableAutoCwd: true
            workingDirectory: $(terraformWorkingDir)

      - ${{ if eq(parameters.provider, 'azureVm') }}:
        - task: AzureCLI@2
          displayName: Stop agent
          inputs:
            azureSubscription: ${{ coalesce(parameters.connection, 'Azure') }}
            addSpnToEnvironment: true
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              $env:ARM_CLIENT_ID=$env:servicePrincipalId
              $env:ARM_CLIENT_SECRET=$env:servicePrincipalKey
              $env:ARM_SUBSCRIPTION_ID=$(az account show --query 'id' --output tsv)
              $env:ARM_TENANT_ID=$env:tenantId
              terraform destroy -auto-approve -input=false
            workingDirectory: $(terraformWorkingDir)
